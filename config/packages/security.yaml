security:
  # 🔐 Encodage automatique des mots de passe
  password_hashers:
    App\Entity\User:
      algorithm: auto

  # 👤 Source des utilisateurs (entité User)
  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email

  firewalls:
    # ⚙️ Désactivation pour les ressources publiques et dev
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    # 📱 API Mobile (stateless, Bearer token)
    api:
      pattern: ^/api
      stateless: true
      provider: app_user_provider
      access_token:
        token_handler: App\Security\ApiTokenHandler

    # 🔥 Firewall principal
    main:
      lazy: true
      provider: app_user_provider
      user_checker: App\Security\UserChecker   # ✅ bien placé ici !

      # 🧭 Connexion via formulaire
      form_login:
        login_path: app_login
        check_path: app_login
        enable_csrf: true
        default_target_path: home   # ✅ Redirection après login
        always_use_default_target_path: false
        success_handler: App\Security\LoginSuccessHandler  # (optionnel)

      # 🚪 Déconnexion
      logout:
        path: app_logout
        target: home   # ✅ Retour à la page d'accueil

      # 🔒 “Souviens-toi de moi”
      remember_me:
        secret: '%kernel.secret%'
        lifetime: 604800   # 7 jours
        path: /
        always_remember_me: false

  # ✅ Vérification personnalisée pour bloquer les comptes non approuvés
  access_decision_manager:
    strategy: unanimous

  # 🎯 Règles d’accès
  access_control:
    # 📱 API publique (login uniquement)
    - { path: ^/api/login, roles: PUBLIC_ACCESS }
    - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

    # 🌐 Pages publiques
    - { path: ^/login, roles: PUBLIC_ACCESS }
    - { path: ^/logout, roles: PUBLIC_ACCESS }
    - { path: ^/about, roles: PUBLIC_ACCESS }
    - { path: ^/contact, roles: PUBLIC_ACCESS }
    - { path: ^/register, roles: PUBLIC_ACCESS }
    - { path: ^/$, roles: PUBLIC_ACCESS }

    # 👑 Zone administrateur
    - { path: ^/admin, roles: ROLE_ADMIN }

    # 👩‍🏫 Zone enseignant
    - { path: ^/teacher, roles: ROLE_TEACHER }

    # 👨‍🎓 Zone étudiant
    - { path: ^/student, roles: ROLE_STUDENT }

    # 📘 Gestion des examens
    - { path: ^/exam, roles: IS_AUTHENTICATED_FULLY }

    # 🔒 Fallback global : toute autre route nécessite une connexion
    - { path: ^/, roles: IS_AUTHENTICATED_FULLY }
